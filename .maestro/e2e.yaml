# 360 FlatMates — Full E2E Suite
# Seeded room-poster login → smoke flows → logout
# Run: maestro test .maestro/e2e.yaml
#
# Prerequisites:
#   - Seeded backend with an already-onboarded room_poster account
#   - MAESTRO_PHONE and MAESTRO_PASSWORD exported in the shell
#   - Completed onboarding for the seeded account
#   - At least 3 discover listings in the backend
#   - At least 1 existing conversation for chat/schedule testing

appId: com.the360ghar.flatmates360
name: Full E2E
tags:
  - smoke
---
- launchApp:
    clearState: true

# Auth
- runFlow: auth/login.yaml

# Navigation
- runFlow: navigation/tabs.yaml

# Discover
- runFlow: discover/feed.yaml
- runFlow: discover/search_filters.yaml
- runFlow: discover/flat_details.yaml

# Swipe
- runFlow: swipe/swipe.yaml

# Chats
- runFlow: chats/chats.yaml
- runFlow: chats/schedule_visit.yaml

# Profile & Settings
- runFlow: profile/profile.yaml
- runFlow: profile/edit_profile.yaml
- runFlow: profile/settings.yaml
- runFlow: profile/help_safety.yaml

# Notifications
- runFlow: notifications/notifications.yaml

# Listings (room_poster mode)
- runFlow: listings/create_listing.yaml

# Logout
- runFlow: navigation/logout.yaml
