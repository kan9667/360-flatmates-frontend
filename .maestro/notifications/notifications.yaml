appId: com.the360ghar.flatmates360
name: Notifications
tags:
  - notifications
---
# Navigate to notifications, verify list, mark all read.
# Prerequisites: User is logged in as room_poster.
# Notifications bell is on the Post hub header.

# ── Navigate to notifications through Post hub ─────────────
- tapOn:
    id: "nav_post_tab"
- extendedWaitUntil:
    visible:
      id: "post_hub_post_card"
    timeout: 5000

- tapOn:
    id: "post_notifications_button"

- extendedWaitUntil:
    visible:
      id: "notification_mark_all_read"
    timeout: 5000

# ── Mark all as read ───────────────────────────────────────
- tapOn:
    id: "notification_mark_all_read"

# ── Scroll through list ────────────────────────────────────
- scroll:
    direction: DOWN
- scroll:
    direction: UP

# ── Go back ────────────────────────────────────────────────
- back
- extendedWaitUntil:
    visible:
      id: "post_hub_post_card"
    timeout: 5000
