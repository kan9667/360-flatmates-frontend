appId: com.the360ghar.flatmates360
name: Profile View
tags:
  - profile
---
# Verify profile page elements and menu items.
# Prerequisites: User is logged in.

- tapOn:
    id: "nav_me_tab"
- extendedWaitUntil:
    visible:
      id: "profile_edit_button"
    timeout: 5000

# ── Verify profile elements ────────────────────────────────
- assertVisible:
    id: "profile_name_text"

# ── Verify menu items ──────────────────────────────────────
- scrollUntilVisible:
    element:
      id: "profile_settings_menu_item"
    direction: DOWN
- assertVisible:
    id: "profile_settings_menu_item"
- scrollUntilVisible:
    element:
      id: "profile_help_safety_menu_item"
    direction: DOWN
- assertVisible:
    id: "profile_help_safety_menu_item"

# ── Scroll to see all items ────────────────────────────────
- scrollUntilVisible:
    element:
      id: "logout_button"
    direction: DOWN
- assertVisible:
    id: "logout_button"
