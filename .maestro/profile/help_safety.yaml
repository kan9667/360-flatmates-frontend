appId: com.the360ghar.flatmates360
name: Help and Safety
tags:
  - profile
---
# Verify Help & Safety page.
# Prerequisites: User is logged in.

- tapOn:
    id: "nav_me_tab"
- extendedWaitUntil:
    visible:
      id: "profile_edit_button"
    timeout: 5000

# ── Navigate to Help & Safety ──────────────────────────────
- scrollUntilVisible:
    element:
      id: "profile_help_safety_menu_item"
    direction: DOWN

- tapOn:
    id: "profile_help_safety_menu_item"

- extendedWaitUntil:
    visible:
      id: "help_faq_item"
    timeout: 5000

# ── Verify help page content ───────────────────────────────
- assertVisible:
    id: "help_faq_item"
- assertVisible:
    id: "help_contact_item"

# ── Back to profile ────────────────────────────────────────
- back
