appId: com.the360ghar.flatmates360
name: Settings
tags:
  - profile
---
# Test settings: theme, language, privacy toggles.
# Prerequisites: User is logged in.

- tapOn:
    id: "nav_me_tab"
- extendedWaitUntil:
    visible:
      id: "profile_edit_button"
    timeout: 5000

# ── Navigate to settings ───────────────────────────────────
- scroll:
    direction: DOWN

- tapOn:
    text: "Settings"
- extendedWaitUntil:
    visible:
      text: "Settings"
    timeout: 5000

# ── Open preferences sheet ─────────────────────────────────
- tapOn:
    id: "preferences_menu_item"
- extendedWaitUntil:
    visible:
      id: "theme_mode_dark_option"
    timeout: 5000

# ── Theme: switch to dark ──────────────────────────────────
- tapOn:
    id: "theme_mode_dark_option"
- extendedWaitUntil:
    visible:
      id: "theme_mode_light_option"
    timeout: 2000

# ── Theme: switch back to light ────────────────────────────
- tapOn:
    id: "theme_mode_light_option"

# ── Palette: switch ────────────────────────────────────────
- tapOn:
    text: "Warm Clay"
    optional: true

# ── Language: switch to Hindi ──────────────────────────────
- tapOn:
    id: "language_hindi_option"
- extendedWaitUntil:
    visible:
      text: "Settings"
    timeout: 3000

# ── Language: switch back to English ───────────────────────
- tapOn:
    id: "language_english_option"
- extendedWaitUntil:
    visible:
      text: "Settings"
    timeout: 3000

# ── Privacy toggles ────────────────────────────────────────
- tapOn:
    id: "setting_hide_last_name"
- tapOn:
    id: "setting_hide_location"

# Toggle back
- tapOn:
    id: "setting_hide_last_name"
- tapOn:
    id: "setting_hide_location"

# ── Close preferences ──────────────────────────────────────
- back

# ── Privacy & Security ─────────────────────────────────────
- tapOn:
    text: "Privacy & Security"
    optional: true
- extendedWaitUntil:
    visible:
      id: "privacy_change_password_item"
    timeout: 3000
    optional: true
- back

# ── Back to profile ────────────────────────────────────────
- back
- extendedWaitUntil:
    visible:
      id: "nav_me_tab"
    timeout: 5000
