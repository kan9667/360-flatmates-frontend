appId: com.the360ghar.flatmates360
name: Bottom Navigation Tabs
tags:
  - smoke
  - navigation
---
# Verify all bottom nav tabs switch correctly.
# Prerequisites: User is logged in, on discover screen.

# ── Home tab (already selected) ────────────────────────────
- assertVisible:
    id: "nav_home_tab"
- extendedWaitUntil:
    visible:
      id: "home_search_bar"
    timeout: 5000

# ── Swipe tab ──────────────────────────────────────────────
- tapOn:
    id: "nav_swipe_tab"
- extendedWaitUntil:
    visible:
      id: "swipe_filter_tune"
    timeout: 5000

# ── Likes & Chat tab ──────────────────────────────────────
- tapOn:
    id: "nav_inbox_tab"
- extendedWaitUntil:
    visible:
      id: "chats_chats_tab"
    timeout: 5000

# ── Profile tab ────────────────────────────────────────────
- tapOn:
    id: "nav_me_tab"
- extendedWaitUntil:
    visible:
      id: "profile_edit_button"
    timeout: 5000

# ── Back to Home ───────────────────────────────────────────
- tapOn:
    id: "nav_home_tab"
- extendedWaitUntil:
    visible:
      id: "home_search_bar"
    timeout: 5000
