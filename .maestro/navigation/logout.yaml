appId: com.the360ghar.flatmates360
name: Logout
tags:
  - navigation
---
# Logout and verify return to enter-phone screen.
# Prerequisites: User is logged in.

- tapOn:
    id: "nav_me_tab"
- extendedWaitUntil:
    visible:
      id: "profile_edit_button"
    timeout: 5000

# Scroll to logout button
- scroll:
    direction: DOWN

- tapOn:
    id: "logout_button"

# Verify we're back on the enter-phone screen
- extendedWaitUntil:
    visible:
      id: "enter_phone_input"
    timeout: 10000
