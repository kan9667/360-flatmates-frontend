appId: com.the360ghar.flatmates360
name: Schedule Visit
tags:
  - chats
---
# Schedule a visit from a seeded conversation.
# Prerequisites: User is logged in and at least 1 conversation exists.

- tapOn:
    id: "nav_inbox_tab"
- extendedWaitUntil:
    visible:
      id: "chats_chats_tab"
    timeout: 5000
- tapOn:
    id: "chats_chats_tab"
- extendedWaitUntil:
    visible:
      id: "conversation_card_0"
    timeout: 10000
- tapOn:
    id: "conversation_card_0"
- extendedWaitUntil:
    visible:
      id: "chat_message_input"
    timeout: 5000

# ── Tap schedule visit in chat header ──────────────────────
- tapOn:
    id: "chat_schedule_visit_button"

# ── Verify schedule visit page ─────────────────────────────
- extendedWaitUntil:
    visible:
      id: "visit_send_request_button"
    timeout: 5000

# ── Select afternoon time slot ─────────────────────────────
- tapOn:
    id: "visit_afternoon_slot"

# ── Add a note ─────────────────────────────────────────────
- tapOn:
    id: "visit_note_input"
- inputText: "Looking forward to the visit!"

# ── Send request ───────────────────────────────────────────
- tapOn:
    id: "visit_send_request_button"

- extendedWaitUntil:
    visible:
      id: "chat_message_input"
    timeout: 5000

# Go back
- back
- extendedWaitUntil:
    visible:
      id: "conversation_card_0"
    timeout: 5000
