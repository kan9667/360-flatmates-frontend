appId: com.the360ghar.flatmates360
name: Chats and Conversations
tags:
  - chats
---
# Test conversation tabs, open a chat, send a message.
# Prerequisites: User is logged in, at least 1 conversation exists.

- tapOn:
    id: "nav_inbox_tab"
- extendedWaitUntil:
    visible:
      id: "chats_chats_tab"
    timeout: 5000

# ── Verify Likes tab ───────────────────────────────────────
- tapOn:
    id: "chats_likes_tab"
- extendedWaitUntil:
    visible:
      id: "chats_likes_tab"
    timeout: 3000

# ── Switch to Liked tab ────────────────────────────────────
- tapOn:
    id: "chats_liked_tab"
- extendedWaitUntil:
    visible:
      id: "chats_liked_tab"
    timeout: 3000

# ── Switch to Chats tab ────────────────────────────────────
- tapOn:
    id: "chats_chats_tab"
- extendedWaitUntil:
    visible:
      id: "chats_chats_tab"
    timeout: 3000

# ── Open first conversation ────────────────────────────────
- extendedWaitUntil:
    visible:
      id: "conversation_card_0"
    timeout: 10000
- tapOn:
    id: "conversation_card_0"

# Send a message in the chat thread
- extendedWaitUntil:
    visible:
      id: "chat_message_input"
    timeout: 5000

- tapOn:
    id: "chat_message_input"
- inputText: "Hey, I'm interested in the room!"
- tapOn:
    id: "chat_send_button"

- extendedWaitUntil:
    visible:
      text: "Hey, I'm interested in the room!"
    timeout: 5000

# Go back to conversations
- back
- extendedWaitUntil:
    visible:
      id: "conversation_card_0"
    timeout: 5000
