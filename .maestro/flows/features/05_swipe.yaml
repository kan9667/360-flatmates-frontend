appId: com.the360ghar.flatmates
---
# Feature: Swipe Deck
# Starting state: On any tab
- tapOn:
    id: "nav_swipe_tab"
- extendedWaitUntil:
    visible:
      id: "swipe_card"
    timeout: 10000

# Swipe right (Like) on the first profile
- swipe:
    from:
      id: "swipe_card"
    direction: RIGHT

# Wait for the next card to settle
- extendedWaitUntil:
    visible:
      id: "swipe_card"
    timeout: 5000

# Swipe left (Pass) on the next profile
- swipe:
    from:
      id: "swipe_card"
    direction: LEFT

# Wait for next card, match celebration, or empty state
- assertVisible:
    id: "swipe_card"
    optional: true

# If match celebration appeared, dismiss it
- tapOn:
    id: "match_keep_swiping"
    optional: true
