appId: com.the360ghar.flatmates360
name: Create Listing
tags:
  - listings
---
# Multi-step listing creation (Room Poster mode).
# The test account must have mode=room_poster.
# Requires a real backend with catalog data.
# This smoke intentionally stops at the photo step: advancing past it requires
# native image-picker automation plus two real listing photo uploads.

- tapOn:
    id: "nav_post_tab"
- extendedWaitUntil:
    visible:
      id: "post_hub_post_card"
    timeout: 5000

# ── Tap Post card ──────────────────────────────────────────
- tapOn:
    id: "post_hub_post_card"

- extendedWaitUntil:
    visible:
      id: "listing_society_input"
    timeout: 5000

# ── Step 0: Location ───────────────────────────────────────
- tapOn:
    id: "listing_society_input"
- inputText: "Test Society"

- tapOn:
    id: "listing_city_input"
- inputText: "Bangalore"

- tapOn:
    id: "listing_locality_input"
- inputText: "Koramangala"

- tapOn:
    id: "listing_next_button"

- extendedWaitUntil:
    visible:
      id: "listing_back_button"
    timeout: 5000

# ── Step 1: Society defaults are valid ─────────────────────
- tapOn:
    id: "listing_next_button"

# ── Step 2: Room defaults are valid ────────────────────────
- tapOn:
    id: "listing_next_button"

# ── Step 3: Photos is the first native/media dependency ────
- extendedWaitUntil:
    visible:
      id: "listing_add_photos_tile"
    timeout: 5000
