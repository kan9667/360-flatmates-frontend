appId: com.the360ghar.flatmates360
name: Phone Login
tags:
  - smoke
  - auth
---
# Login with phone + password.
# The enter-phone screen checks identifier status; a registered account
# with a password is routed to the password screen automatically.
# Prerequisites: App is on Enter Phone screen after launchApp.
# Requires env vars: MAESTRO_PHONE, MAESTRO_PASSWORD

- extendedWaitUntil:
    visible:
      id: "enter_phone_input"
    timeout: 10000

- tapOn:
    id: "enter_phone_input"
- inputText: ${MAESTRO_PHONE}

- tapOn:
    id: "terms_checkbox"
    optional: true

- tapOn:
    id: "enter_phone_continue_cta"

- extendedWaitUntil:
    visible:
      id: "login_password_input"
    timeout: 10000

- tapOn:
    id: "login_password_input"
- inputText: ${MAESTRO_PASSWORD}

- tapOn:
    id: "login_submit_button"

# Wait for bootstrap + redirect to discover
- extendedWaitUntil:
    visible:
      id: "nav_home_tab"
    timeout: 15000
