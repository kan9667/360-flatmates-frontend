appId: com.the360ghar.flatmates360
name: Phone Signup via OTP
tags:
  - auth
---
# Create a new account via OTP-first flow: enter phone → OTP → set-password.
# Prerequisites: App is on Enter Phone screen. Seeded OTP is 123456.
# Requires env vars: MAESTRO_PHONE, MAESTRO_PASSWORD

- extendedWaitUntil:
    visible:
      id: "enter_phone_input"
    timeout: 10000

- tapOn:
    id: "enter_phone_input"
- inputText: ${MAESTRO_PHONE}

- tapOn:
    id: "terms_checkbox"
    optional: true

- tapOn:
    id: "enter_phone_continue_cta"

# Wait for OTP screen
- extendedWaitUntil:
    visible:
      id: "otp_submit_button"
    timeout: 10000

# Enter OTP (seeded test OTP: 123456)
- inputText: "123456"

- tapOn:
    id: "otp_submit_button"

# Set password (mandatory after OTP verify for passwordless account)
- extendedWaitUntil:
    visible:
      id: "set_password_input"
    timeout: 10000

- tapOn:
    id: "set_password_input"
- inputText: ${MAESTRO_PASSWORD}

- tapOn:
    id: "set_password_confirm_input"
- inputText: ${MAESTRO_PASSWORD}

- tapOn:
    id: "set_password_submit_button"

# Wait for redirect
- extendedWaitUntil:
    visible:
      id: "nav_home_tab"
    timeout: 15000
