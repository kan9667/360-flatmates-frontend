appId: com.the360ghar.flatmates360
name: Flat Details
tags:
  - discover
---
# Tap a listing card, verify flat details page, scroll, go back.
# Prerequisites: User is logged in, on discover screen with listings.

- assertVisible:
    id: "home_search_bar"

- extendedWaitUntil:
    visible:
      id: "discover_listing_card_0"
    timeout: 10000

# ── Tap the first listing card ─────────────────────────────
- tapOn:
    id: "discover_listing_card_0"

# ── Verify flat details page ───────────────────────────────
- extendedWaitUntil:
    visible:
      id: "flat_contact_button"
    timeout: 5000
- assertVisible:
    id: "flat_shortlist_button"

# ── Scroll through details ─────────────────────────────────
- scroll:
    direction: DOWN
- scroll:
    direction: DOWN

# ── Go back ────────────────────────────────────────────────
- back
- extendedWaitUntil:
    visible:
      id: "home_search_bar"
    timeout: 5000
