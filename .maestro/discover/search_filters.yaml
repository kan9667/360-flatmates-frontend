appId: com.the360ghar.flatmates360
name: Search and Filters
tags:
  - discover
---
# Open search filters, apply filters, verify results.
# Prerequisites: User is logged in, on discover screen.

- assertVisible:
    id: "home_search_bar"

# ── Open filter sheet ──────────────────────────────────────
- tapOn:
    id: "home_search_bar"

- extendedWaitUntil:
    visible:
      id: "search_show_results_button"
    timeout: 5000

# ── Apply room type filter ─────────────────────────────────
- tapOn:
    id: "search_room_type_private"

# ── Apply furnishing filter ────────────────────────────────
- tapOn:
    id: "search_furnishing_furnished"

# ── Show results ───────────────────────────────────────────
- tapOn:
    id: "search_show_results_button"

- extendedWaitUntil:
    visible:
      id: "home_search_bar"
    timeout: 10000
