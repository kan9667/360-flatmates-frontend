appId: com.the360ghar.flatmates360
name: Explore Map View
tags:
  - discover
---
# Verify Explore/Map tab (Co-Hunter mode tab 2).
# Prerequisites: User is logged in as co_hunter.

- tapOn:
    id: "nav_explore_tab"
    optional: true

- extendedWaitUntil:
    visible:
      text: "Explore"
    timeout: 5000

# Verify map or empty state
- assertVisible:
    text: "Explore"
    optional: true

# Scroll through listing sheets
- scroll:
    direction: DOWN
    optional: true

# Navigate back to home
- tapOn:
    id: "nav_home_tab"
