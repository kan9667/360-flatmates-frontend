appId: com.the360ghar.flatmates360
name: Home Feed
tags:
  - smoke
  - discover
---
# Verify home feed loads, scroll, open a listing.
# Prerequisites: User is logged in, on discover screen.

# ── Verify feed sections ───────────────────────────────────
- assertVisible:
    id: "nav_home_tab"
- extendedWaitUntil:
    visible:
      id: "home_search_bar"
    timeout: 5000
- extendedWaitUntil:
    visible:
      id: "discover_listing_card_0"
    timeout: 10000

# ── Scroll the feed ────────────────────────────────────────
- scroll:
    direction: DOWN
- scroll:
    direction: DOWN
- scroll:
    direction: UP

# ── Open a listing card ────────────────────────────────────
- scrollUntilVisible:
    element:
      id: "discover_listing_card_0"
    direction: UP

- tapOn:
    id: "discover_listing_card_0"

- extendedWaitUntil:
    visible:
      id: "flat_contact_button"
    timeout: 5000

# ── Verify flat details content ────────────────────────────
- assertVisible:
    id: "flat_contact_button"

# Scroll through details
- scroll:
    direction: DOWN
- scroll:
    direction: DOWN

# ── Go back to feed ────────────────────────────────────────
- back
- extendedWaitUntil:
    visible:
      id: "home_search_bar"
    timeout: 5000

# ── Open browse listings via "See all" ─────────────────────
- scrollUntilVisible:
    element:
      id: "home_picked_for_you_see_all"
    direction: UP

- tapOn:
    id: "home_picked_for_you_see_all"

- extendedWaitUntil:
    visible:
      id: "browse_search_open"
    timeout: 5000

# Go back to discover
- back
- extendedWaitUntil:
    visible:
      id: "home_search_bar"
    timeout: 5000
