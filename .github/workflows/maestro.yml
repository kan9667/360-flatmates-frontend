name: Maestro E2E Tests

on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  maestro_test:
    name: Run Maestro Flows (Android)
    runs-on: macos-14
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          flutter-version-file: '.fvmrc'
          channel: 'stable'
          cache: true

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Maestro CLI
        run: |
          MAESTRO_VERSION="cli-2.6.1"
          MAESTRO_BASE_URL="https://github.com/mobile-dev-inc/Maestro/releases/download/${MAESTRO_VERSION}"
          MAESTRO_ZIP="$RUNNER_TEMP/maestro.zip"
          CHECKSUMS_FILE="$RUNNER_TEMP/checksums_sha256.txt"

          curl -fsSL "$MAESTRO_BASE_URL/maestro.zip" -o "$MAESTRO_ZIP"
          curl -fsSL "$MAESTRO_BASE_URL/checksums_sha256.txt" -o "$CHECKSUMS_FILE"

          EXPECTED_CHECKSUM="$(grep 'maestro.zip$' "$CHECKSUMS_FILE" | awk '{print $1}')"
          ACTUAL_CHECKSUM="$(shasum -a 256 "$MAESTRO_ZIP" | awk '{print $1}')"

          if [ -z "$EXPECTED_CHECKSUM" ]; then
            echo "Unable to find maestro.zip checksum"
            exit 1
          fi

          if [ "$EXPECTED_CHECKSUM" != "$ACTUAL_CHECKSUM" ]; then
            echo "Maestro checksum mismatch"
            exit 1
          fi

          rm -rf "$HOME/.maestro-install"
          mkdir -p "$HOME/.maestro-install"
          unzip -q "$MAESTRO_ZIP" -d "$HOME/.maestro-install"
          echo "$HOME/.maestro-install/maestro/bin" >> "$GITHUB_PATH"

      - run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Run tests on emulator
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a
        env:
          MAESTRO_PHONE: ${{ secrets.MAESTRO_PHONE }}
          MAESTRO_PASSWORD: ${{ secrets.MAESTRO_PASSWORD }}
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: |
            adb shell settings put global window_animation_scale 0.0
            adb shell settings put global transition_animation_scale 0.0
            adb shell settings put global animator_duration_scale 0.0
            adb install build/app/outputs/flutter-apk/app-debug.apk
            maestro test .maestro/e2e.yaml --format junit --output maestro-report.xml

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: maestro-report
          path: maestro-report.xml
