name: Android Release Build & Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  build_and_publish_android:
    name: Build & Publish to Play Store (internal)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          flutter-version-file: '.fvmrc'
          channel: 'stable'
          cache: true

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/keystore.jks

      - name: Create key.properties
        env:
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEYSTORE_FILE: ${{ github.workspace }}/android/app/keystore.jks
        run: |
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=%s\n' \
            "$ANDROID_STORE_PASSWORD" \
            "$ANDROID_KEY_PASSWORD" \
            "$ANDROID_KEY_ALIAS" \
            "$KEYSTORE_FILE" \
            > android/app/key.properties

      # .env is gitignored and not available in CI. Provide a minimal optional
      # asset so Flutter asset bundling succeeds; real config comes from defines.
      - name: Stub optional .env asset
        run: |
          if [ ! -f .env ]; then
            printf 'APP_ENV=prod\n' > .env
          fi

      - run: flutter pub get

      - name: Build APK
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
          GOOGLE_IOS_CLIENT_ID: ${{ secrets.GOOGLE_IOS_CLIENT_ID }}
        run: |
          flutter build apk --release \
            --obfuscate \
            --split-debug-info=build/symbols \
            --dart-define=APP_ENV=prod \
            --dart-define=API_BASE_URL="$API_BASE_URL" \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_PUBLISHABLE_KEY="$SUPABASE_PUBLISHABLE_KEY" \
            --dart-define=GOOGLE_WEB_CLIENT_ID="$GOOGLE_WEB_CLIENT_ID" \
            --dart-define=GOOGLE_IOS_CLIENT_ID="$GOOGLE_IOS_CLIENT_ID" \
            --dart-define=ENABLE_DEBUG_LOGS=false

      - name: Build AAB
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
          GOOGLE_IOS_CLIENT_ID: ${{ secrets.GOOGLE_IOS_CLIENT_ID }}
        run: |
          flutter build appbundle --release \
            --obfuscate \
            --split-debug-info=build/symbols \
            --dart-define=APP_ENV=prod \
            --dart-define=API_BASE_URL="$API_BASE_URL" \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_PUBLISHABLE_KEY="$SUPABASE_PUBLISHABLE_KEY" \
            --dart-define=GOOGLE_WEB_CLIENT_ID="$GOOGLE_WEB_CLIENT_ID" \
            --dart-define=GOOGLE_IOS_CLIENT_ID="$GOOGLE_IOS_CLIENT_ID" \
            --dart-define=ENABLE_DEBUG_LOGS=false

      - name: Upload APK artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab

      - name: Upload debug symbols
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: app-release-symbols
          path: build/symbols

      - name: Publish to Play Store (internal track)
        uses: r0adkll/upload-google-play@e738b9dd8f2476ea806d921b64aacd24f34515a5
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: com.the360ghar.flatmates360
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          # Internal testing by default — promote to production manually after QA.
          tracks: internal
          status: completed
