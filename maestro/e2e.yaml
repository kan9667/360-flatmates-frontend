# 360 FlatMates — Maestro E2E Flow
# Prerequisites:
#   - Seeded Supabase user: phone +91 9999999999, OTP: 123456
#   - At least 1 flatmate listing in the backend
#   - App installed on iOS Simulator or Android Emulator

appId: com.the360ghar.flatmates
---
- launchApp
- assertVisible: "Get Started"
- tapOn: "Get Started"

# Mode selection
- assertVisible: "Room Poster"
- tapOn: "Co-Hunter"

# Basic info
- assertVisible: "Full name"
- tapOn: "Full name"
- inputText: "Test User"
- tapOn: "Age"
- inputText: "25"
- tapOn: "Profession"
- inputText: "Software Engineer"
- tapOn: "City"
- inputText: "Bangalore"
- tapOn: "Next"

# Profile photo (skip — no gallery in CI)
- tapOn: "Next"

# Lifestyle quiz — select first option for each
- tapOn:
    text: "Early bird"
    optional: true
- tapOn:
    text: "Tidy"
    optional: true
- tapOn:
    text: "Vegetarian"
    optional: true
- tapOn:
    text: "Neither"
    optional: true
- tapOn:
    text: "Occasional guests are ok"
    optional: true
- tapOn:
    text: "Never"
    optional: true
- tapOn:
    text: "Office mostly"
    optional: true
- tapOn:
    text: "No pets"
    optional: true
- tapOn: "Next"

# Budget & timeline
- tapOn: "Flexible"
- tapOn: "Complete"

# Wait for discover page
- assertVisible:
    text: "Picked for You"
    optional: true
- assertVisible:
    text: "Discover"
    optional: true

# Navigate to swipe tab
- tapOn: "Swipe"
- assertVisible:
    text: "remaining"
    optional: true

# Navigate to chats
- tapOn: "Likes & Chat"
- assertVisible:
    text: "Likes"
    optional: true

# Navigate to profile
- tapOn: "Profile"
- assertVisible: "Test User"
- assertVisible: "Co-Hunter"

# Navigate to settings
- tapOn: "Settings"
- assertVisible: "Appearance"
